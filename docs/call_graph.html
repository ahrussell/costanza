<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Human Fund — Function Call Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: #0d1117; color: #e6edf3;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
header {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0;
}
header h1 { font-size: 14px; font-weight: 600; }
.badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb66; }
.sep { color: #30363d; }
.ctrl { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #8b949e; cursor: pointer; user-select: none; }
.ctrl input { cursor: pointer; accent-color: #58a6ff; }
.hbtn { font-size: 11px; padding: 3px 10px; border-radius: 5px;
  background: #21262d; border: 1px solid #30363d; color: #8b949e; cursor: pointer; transition: all 0.15s; }
.hbtn:hover { background: #30363d; color: #e6edf3; }
.layout { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 195px; background: #161b22; border-right: 1px solid #30363d;
  overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.sb-sec { padding: 10px 12px; border-bottom: 1px solid #30363d; }
.sb-sec h3 { font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: #8b949e; margin-bottom: 8px; }
.leg-item { display: flex; align-items: center; gap: 7px; padding: 4px 6px;
  border-radius: 5px; font-size: 12px; cursor: pointer; transition: background 0.12s; user-select: none; }
.leg-item:hover { background: rgba(255,255,255,.05); }
.leg-item.hidden { opacity: 0.35; }
.leg-item.hidden .leg-dot { opacity: 0.3; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.leg-count { margin-left: auto; font-size: 10px; color: #8b949e; font-family: monospace; }
.size-demo { padding: 10px 12px; border-bottom: 1px solid #30363d; }
.size-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.sz { background: #475569; border-radius: 50%; flex-shrink: 0; }
.sz-lbl { font-size: 11px; color: #8b949e; }
.sb-bottom { margin-top: auto; padding: 10px 12px; }
.stat-row { font-size: 11px; color: #8b949e; margin-bottom: 3px; }
.stat-row span { color: #c9d1d9; }
#gc { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; cursor: grab; }
svg:active { cursor: grabbing; }
.hull { stroke-width: 28; stroke-linejoin: round; fill-opacity: .07; stroke-opacity: .12; }
.link { fill: none; }
.lk-cross { stroke-width: 1.8; opacity: .6; }
.lk-int   { stroke-width: 1.2; stroke-dasharray: 4 3; opacity: .3; }
.lk-cross.hi, .lk-int.hi { opacity: 1 !important; stroke-width: 2.5 !important; }
.lk-cross.dim { opacity: .04 !important; }
.lk-int.dim   { opacity: .03 !important; }
.node circle { stroke-width: 1.5; transition: stroke-width .1s; }
.node.dim circle { opacity: .12; }
.node.dim text  { opacity: .07; }
.node circle.sel { stroke-width: 3; }
.node-lbl { font-size: 9.5px; fill: rgba(255,255,255,.82); pointer-events: none;
  text-anchor: middle; dominant-baseline: central;
  font-family: 'SFMono-Regular', Consolas, monospace; }
.tip { position: absolute; background: #1c2128; border: 1px solid #30363d;
  border-radius: 8px; padding: 10px 13px; font-size: 12px; pointer-events: none;
  max-width: 290px; z-index: 100; line-height: 1.6; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
.tt-contract { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 1px; }
.tt-name { font-family: monospace; font-weight: 700; font-size: 14px; margin-bottom: 3px; }
.tt-row { font-size: 11px; color: #8b949e; margin-bottom: 1px; }
.tt-sec { margin-top: 7px; }
.tt-sec-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: #8b949e; margin-bottom: 2px; }
.tt-fn { font-family: monospace; font-size: 11px; }
.tt-fn-int { font-family: monospace; font-size: 11px; color: #8b949e; }
.zoom-lbl { position: absolute; bottom: 10px; right: 12px; font-size: 11px; color: #484f58; }
</style>
</head>
<body>
<header>
  <h1>The Human Fund</h1>
  <span class="badge">nextphase · function-level</span>
  <span class="sep">|</span>
  <label class="ctrl"><input type="checkbox" id="chkInt" checked> Internal calls</label>
  <label class="ctrl"><input type="checkbox" id="chkLbl" checked> Labels</label>
  <label class="ctrl"><input type="checkbox" id="chkHull" checked> Group areas</label>
  <button class="hbtn" id="resetBtn">↺ Reset</button>
  <span style="margin-left:auto;font-size:11px;color:#484f58">Drag nodes · Scroll to zoom · Click to focus</span>
</header>
<div class="layout">
  <div class="sidebar">
    <div class="sb-sec"><h3>Contracts</h3><div id="legend"></div></div>
    <div class="size-demo">
      <h3 style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8b949e;margin-bottom:8px">Node size = LOC</h3>
      <div class="size-row"><div class="sz" style="width:12px;height:12px"></div><span class="sz-lbl">1–5 lines</span></div>
      <div class="size-row"><div class="sz" style="width:17px;height:17px"></div><span class="sz-lbl">~20 lines</span></div>
      <div class="size-row"><div class="sz" style="width:23px;height:23px"></div><span class="sz-lbl">~50 lines</span></div>
      <div class="size-row" style="margin-bottom:0"><div class="sz" style="width:29px;height:29px"></div><span class="sz-lbl">80+ lines</span></div>
    </div>
    <div class="sb-bottom">
      <div class="stat-row">Nodes: <span id="nodeCount">–</span></div>
      <div class="stat-row">Edges: <span id="edgeCount">–</span></div>
    </div>
  </div>
  <div id="gc">
    <svg id="graph"></svg>
    <div class="tip" id="tip" style="display:none"></div>
    <div class="zoom-lbl" id="zoomLbl">100%</div>
  </div>
</div>
<script>
const CM = {
  THF: { name:'TheHumanFund',         color:'#3b82f6', cx:.44, cy:.42 },
  AM:  { name:'AuctionManager',        color:'#22c55e', cx:.17, cy:.28 },
  IM:  { name:'InvestmentManager',     color:'#f59e0b', cx:.48, cy:.18 },
  WV:  { name:'WorldView',             color:'#a855f7', cx:.78, cy:.28 },
  TDX: { name:'TdxVerifier',           color:'#ef4444', cx:.88, cy:.46 },
  AAW: { name:'AaveV3WETHAdapter',     color:'#0ea5e9', cx:.09, cy:.74 },
  AAU: { name:'AaveV3USDCAdapter',     color:'#06b6d4', cx:.26, cy:.80 },
  CV3: { name:'CompoundV3USDCAdapter', color:'#10b981', cx:.43, cy:.80 },
  MOR: { name:'MorphoWETHAdapter',     color:'#84cc16', cx:.59, cy:.78 },
  WST: { name:'WstETHAdapter',         color:'#f97316', cx:.72, cy:.74 },
  CBE: { name:'CbETHAdapter',          color:'#ec4899', cx:.84, cy:.74 },
  SH:  { name:'SwapHelper',            color:'#8b5cf6', cx:.35, cy:.90 },
};

const LOC = {
  THF: { constructor:39,addNonprofit:19,donate:28,donateWithMessage:37,mintReferralCode:11,_payCommission:14,claimCommission:7,approveVerifier:6,revokeVerifier:6,setInvestmentManager:4,transferOwnership:6,withdrawAll:4,migrate:18,_withdrawTo:10,setWorldView:4,setAuctionManager:19,seedWorldView:8,freeze:4,freezeVerifier:4,_requireNotSunset:4,_bondCap:4,_epochStartTime:3,_advanceEpochBy:11,syncPhase:3,nextPhase:28,resetAuction:8,_resetAuction:38,_nextPhase:48,_advanceToNow:80,_openNextAuction:16,_freezeEpochSnapshot:58,commit:20,reveal:7,submitAuctionResult:39,_snapshotEthUsdPrice:17,_applyPolicyUpdate:9,_recordAndExecute:51,_executeAction:59,_executeDonate:54,_minUsdcForDonation:12,_executeSetCommissionRate:7,_computeInputHash:3,_hashSnapshot:11,_hashSnapshotScalars:26,_liveHashNonprofits:16,_liveHashUnreadMessages:11,_liveHashRecentHistory:11,effectiveMaxBid:32,computeInputHash:3,computeInputHashForEpoch:3,getEpochSnapshot:3,treasuryBalance:3,totalAssets:6,getNonprofit:8,getEpochRecord:7,projectedEpoch:9,epochStartTime:3,messageCount:3,getUnreadMessages:23,receive:6 },
  AM:  { constructor:3,syncPhase:4,_syncPhase:24,openAuction:12,commit:14,recordReveal:26,settleExecution:17,setTiming:6,claimBond:14,abortAuction:37,forceClosePhase:12,_closeCommit:9,_closeReveal:33,_doForfeit:8,_storeHistory:24,_clearCurrentAuction:13,_executionDeadline:3,_getWinner:4,_getBond:4,getPhase:5,getWinner:3,getWinningBid:4,getBond:3,getStartTime:4,getRandomnessSeed:4,getCommitters:4,didReveal:4,getBidRecord:3,executionDeadline:3,receive:2 },
  IM:  { constructor:4,addProtocol:21,setProtocolActive:6,setBounds:9,setAdmin:4,freezeInvestments:4,freezeAdmin:4,deposit:34,withdraw:40,withdrawAll:22,totalInvestedValue:7,stateHash:17,epochStateHash:26,isProtocolActive:4,getProtocolValue:5,getPosition:19,getProtocol:11,receive:2 },
  WV:  { constructor:3,setPolicy:21,getPolicy:4,getPolicies:3,stateHash:6 },
  TDX: { constructor:4,approveImage:5,revokeImage:5,freeze:5,verify:33,computeImageKey:10,_computeImageKey:25 },
  AAW: { constructor:9,deposit:12,withdraw:16,balance:3,name:3,receive:2 },
  AAU: { constructor:16,deposit:11,withdraw:18,balance:15,name:3,receive:2 },
  CV3: { constructor:14,deposit:11,withdraw:17,balance:11,name:3,receive:2 },
  MOR: { constructor:9,deposit:10,withdraw:14,balance:5,name:3,receive:2 },
  WST: { constructor:18,_wstEthPerEth:6,deposit:35,withdraw:34,balance:12,name:3,receive:2 },
  CBE: { constructor:10,deposit:29,withdraw:33,balance:6,name:3,receive:2 },
  SH:  { constructor:11,_swapEthToUsdc:20,_swapUsdcToEth:21,_minUsdcForEth:13,_minEthForUsdc:12 },
};

const INT_EDGES = {
  THF:[['donate','_requireNotSunset'],['donate','_payCommission'],['donateWithMessage','_requireNotSunset'],['donateWithMessage','_payCommission'],['syncPhase','_advanceToNow'],['nextPhase','_nextPhase'],['nextPhase','_advanceEpochBy'],['resetAuction','_resetAuction'],['commit','_requireNotSunset'],['commit','_advanceToNow'],['reveal','_advanceToNow'],['submitAuctionResult','_advanceToNow'],['submitAuctionResult','_applyPolicyUpdate'],['submitAuctionResult','_recordAndExecute'],['computeInputHash','_computeInputHash'],['computeInputHashForEpoch','_computeInputHash'],['withdrawAll','_withdrawTo'],['migrate','_withdrawTo'],['_advanceToNow','_nextPhase'],['_advanceToNow','_advanceEpochBy'],['_advanceToNow','_epochStartTime'],['_nextPhase','_bondCap'],['_nextPhase','_openNextAuction'],['_applyPolicyUpdate','_requireNotSunset'],['_openNextAuction','_snapshotEthUsdPrice'],['_openNextAuction','_freezeEpochSnapshot'],['_openNextAuction','_computeInputHash'],['_freezeEpochSnapshot','effectiveMaxBid'],['_freezeEpochSnapshot','_liveHashNonprofits'],['_freezeEpochSnapshot','_liveHashUnreadMessages'],['_freezeEpochSnapshot','_liveHashRecentHistory'],['_recordAndExecute','_executeAction'],['_executeAction','_executeDonate'],['_executeAction','_executeSetCommissionRate'],['_executeDonate','_minUsdcForDonation'],['_computeInputHash','_hashSnapshot'],['_hashSnapshot','_hashSnapshotScalars']],
  AM: [['syncPhase','_syncPhase'],['forceClosePhase','_closeCommit'],['forceClosePhase','_closeReveal'],['forceClosePhase','_doForfeit'],['openAuction','_clearCurrentAuction'],['abortAuction','_storeHistory'],['abortAuction','_clearCurrentAuction'],['claimBond','_getWinner'],['claimBond','_getBond'],['getWinner','_getWinner'],['getBond','_getBond'],['executionDeadline','_executionDeadline'],['_syncPhase','_closeCommit'],['_syncPhase','_closeReveal'],['_syncPhase','_doForfeit'],['_closeCommit','_storeHistory'],['_closeReveal','_storeHistory'],['_doForfeit','_storeHistory']],
  IM: [['deposit','totalInvestedValue'],['stateHash','totalInvestedValue']],
  TDX:[['verify','_computeImageKey'],['computeImageKey','_computeImageKey']],
  WST:[['deposit','_wstEthPerEth'],['withdraw','_wstEthPerEth'],['balance','_wstEthPerEth']],
};

const CROSS_EDGES = [
  {s:'THF',t:'AM',pairs:[['commit','getBond'],['commit','commit'],['reveal','recordReveal'],['submitAuctionResult','settleExecution'],['submitAuctionResult','getWinningBid'],['_advanceToNow','getPhase'],['_advanceToNow','getStartTime'],['_advanceToNow','executionDeadline'],['_nextPhase','getPhase'],['_nextPhase','getWinner'],['_nextPhase','getBond'],['_nextPhase','forceClosePhase'],['_nextPhase','getRandomnessSeed'],['_openNextAuction','openAuction'],['_resetAuction','abortAuction'],['_resetAuction','setTiming']]},
  {s:'THF',t:'IM',pairs:[['_freezeEpochSnapshot','getProtocolValue'],['_freezeEpochSnapshot','isProtocolActive'],['_freezeEpochSnapshot','epochStateHash'],['_executeAction','deposit'],['_executeAction','withdraw'],['_withdrawTo','withdrawAll'],['totalAssets','totalInvestedValue']]},
  {s:'THF',t:'WV',pairs:[['seedWorldView','setPolicy'],['_applyPolicyUpdate','setPolicy'],['_freezeEpochSnapshot','stateHash']]},
  {s:'THF',t:'TDX',pairs:[['submitAuctionResult','verify'],['freezeVerifier','freeze']]},
  ...['AAW','AAU','CV3','MOR','WST','CBE'].map(a=>({s:'IM',t:a,pairs:[['deposit','deposit'],['withdraw','withdraw'],['withdrawAll','withdraw'],['totalInvestedValue','balance'],['getProtocolValue','balance']]})),
  {s:'AAU',t:'SH',pairs:[['deposit','_swapEthToUsdc'],['withdraw','_swapUsdcToEth']]},
  {s:'CV3',t:'SH',pairs:[['deposit','_swapEthToUsdc'],['withdraw','_swapUsdcToEth']]},
];

function locToR(loc){ return Math.max(6,Math.min(24,4.5+Math.sqrt(loc)*1.7)); }
const gcEl = ()=>document.getElementById('gc');
const W = ()=>gcEl().clientWidth, H = ()=>gcEl().clientHeight;

const nodes=[], nodeMap=new Map();
for(const [cid,fns] of Object.entries(LOC)){
  const meta=CM[cid];
  for(const [fn,loc] of Object.entries(fns)){
    const id=`${cid}.${fn}`;
    const n={id,contract:cid,name:fn,loc,color:meta.color,r:locToR(loc),x:meta.cx*W()+(Math.random()-.5)*80,y:meta.cy*H()+(Math.random()-.5)*80};
    nodes.push(n); nodeMap.set(id,n);
  }
}

const links=[];
for(const [cid,edges] of Object.entries(INT_EDGES)){
  for(const [from,to] of edges){
    const sid=`${cid}.${from}`,tid=`${cid}.${to}`;
    if(nodeMap.has(sid)&&nodeMap.has(tid)) links.push({source:sid,target:tid,type:'int',color:CM[cid].color});
  }
}
for(const {s,t,pairs} of CROSS_EDGES){
  for(const [from,to] of pairs){
    const sid=`${s}.${from}`,tid=`${t}.${to}`;
    if(nodeMap.has(sid)&&nodeMap.has(tid)) links.push({source:sid,target:tid,type:'cross',color:CM[s].color});
  }
}

document.getElementById('nodeCount').textContent=nodes.length;
document.getElementById('edgeCount').textContent=links.length;

// Legend
const hiddenContracts=new Set();
const leg=document.getElementById('legend');
for(const [cid,meta] of Object.entries(CM)){
  const cnt=Object.keys(LOC[cid]).length;
  const div=document.createElement('div');
  div.className='leg-item'; div.dataset.cid=cid;
  div.innerHTML=`<div class="leg-dot" style="background:${meta.color}"></div><span style="font-size:11px">${meta.name}</span><span class="leg-count">${cnt}</span>`;
  div.addEventListener('click',()=>toggleHide(cid));
  leg.appendChild(div);
}

function toggleHide(cid){
  if(hiddenContracts.has(cid)) hiddenContracts.delete(cid);
  else hiddenContracts.add(cid);
  document.querySelectorAll('.leg-item').forEach(el=>el.classList.toggle('hidden',hiddenContracts.has(el.dataset.cid)));
  applyVisibility();
}

function applyVisibility(){
  const intOn=document.getElementById('chkInt').checked;
  nodeSel.style('display',n=>hiddenContracts.has(n.contract)?'none':null);
  linkSel.style('display',l=>{
    const sc=l.source.contract||(l.source.id||l.source).split('.')[0];
    const tc=l.target.contract||(l.target.id||l.target).split('.')[0];
    if(hiddenContracts.has(sc)||hiddenContracts.has(tc)) return 'none';
    if(l.type==='int'&&!intOn) return 'none';
    return null;
  });
  updateHulls();
}

// SVG
const svg=d3.select('#graph');
const zoom=d3.zoom().scaleExtent([.06,4]).on('zoom',e=>{
  g.attr('transform',e.transform);
  document.getElementById('zoomLbl').textContent=Math.round(e.transform.k*100)+'%';
});
svg.call(zoom);
const g=svg.append('g');

// Arrow markers
const defs=svg.append('defs');
const uniqueColors=[...new Set(links.filter(l=>l.type==='cross').map(l=>l.color))];
const colorArrow=new Map();
uniqueColors.forEach(c=>{
  const id='arr-'+c.replace('#','');
  defs.append('marker').attr('id',id).attr('viewBox','0 -4 10 8').attr('refX',9).attr('refY',0)
    .attr('markerWidth',6).attr('markerHeight',6).attr('orient','auto')
    .append('path').attr('d','M0,-4L10,0L0,4').attr('fill',c);
  colorArrow.set(c,id);
});

// Hulls
const hullG=g.append('g');
const hullPaths=hullG.selectAll('path').data(Object.keys(CM)).enter().append('path')
  .attr('class','hull').attr('fill',cid=>CM[cid].color).attr('stroke',cid=>CM[cid].color);

function updateHulls(){
  hullPaths.style('display',cid=>hiddenContracts.has(cid)?'none':null);
  if(!document.getElementById('chkHull').checked){hullPaths.attr('d',null);return;}
  hullPaths.attr('d',cid=>{
    if(hiddenContracts.has(cid)) return null;
    const pts=nodes.filter(n=>n.contract===cid).map(n=>[n.x,n.y]);
    if(pts.length<3){
      const p=pts[0]||[0,0];
      return `M${p[0]-18},${p[1]-18}L${p[0]+18},${p[1]-18}L${p[0]+18},${p[1]+18}L${p[0]-18},${p[1]+18}Z`;
    }
    const hull=d3.polygonHull(pts); if(!hull) return null;
    const cx=d3.mean(hull,p=>p[0]),cy=d3.mean(hull,p=>p[1]);
    const pad=hull.map(([x,y])=>{const dx=x-cx,dy=y-cy,len=Math.hypot(dx,dy)||1;return[x+dx/len*22,y+dy/len*22];});
    return 'M'+pad.map(p=>p.join(',')).join('L')+'Z';
  });
}

// Links
const linkG=g.append('g');
const linkSel=linkG.selectAll('line').data(links).enter().append('line')
  .attr('class',d=>'link '+(d.type==='cross'?'lk-cross':'lk-int'))
  .attr('stroke',d=>d.color)
  .attr('marker-end',d=>d.type==='cross'?`url(#${colorArrow.get(d.color)})`:null);

// Nodes
const nodeG=g.append('g');
const nodeSel=nodeG.selectAll('.node').data(nodes).enter().append('g').attr('class','node')
  .call(d3.drag().on('start',dragStart).on('drag',dragged).on('end',dragEnd))
  .on('click',(e,d)=>{e.stopPropagation();focusNode(d);})
  .on('mouseenter',(e,d)=>showTip(e,d)).on('mousemove',e=>moveTip(e)).on('mouseleave',()=>hideTip());

nodeSel.append('circle').attr('r',d=>d.r).attr('fill',d=>d.color+'33').attr('stroke',d=>d.color);
nodeSel.append('text').attr('class','node-lbl')
  .text(d=>{
    if(d.r>=20) return d.name;
    if(d.r>=14) return d.name.length>14?d.name.slice(0,12)+'…':d.name;
    if(d.r>=10) return d.name.length>9?d.name.slice(0,8)+'…':d.name;
    return '';
  })
  .style('opacity',d=>d.r>=10?1:0);

svg.on('click',()=>focusNode(null));

// Simulation
const sim=d3.forceSimulation(nodes)
  .force('link',d3.forceLink(links).id(d=>d.id).distance(d=>d.type==='int'?55:110).strength(d=>d.type==='int'?.25:.4))
  .force('charge',d3.forceManyBody().strength(d=>-(d.r*18+60)))
  .force('collide',d3.forceCollide().radius(d=>d.r+5).strength(.7))
  .force('clusterX',d3.forceX(d=>CM[d.contract].cx*W()).strength(.07))
  .force('clusterY',d3.forceY(d=>CM[d.contract].cy*H()).strength(.07))
  .alphaDecay(.025).on('tick',ticked);

function ticked(){
  linkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>{
      if(d.type!=='cross') return d.target.x;
      const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,len=Math.hypot(dx,dy)||1;
      return d.target.x-dx/len*(d.target.r+7);
    })
    .attr('y2',d=>{
      if(d.type!=='cross') return d.target.y;
      const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,len=Math.hypot(dx,dy)||1;
      return d.target.y-dy/len*(d.target.r+7);
    });
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  updateHulls();
}

function dragStart(e,d){if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;}
function dragged(e,d){d.fx=e.x;d.fy=e.y;}
function dragEnd(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}

// Focus
let focusedNode=null;
function focusNode(d){
  focusedNode=d;
  if(!d){
    nodeSel.classed('dim',false);
    nodeSel.select('circle').classed('sel',false).attr('stroke',n=>n.color);
    linkSel.classed('hi',false).classed('dim',false);
    applyVisibility();
    return;
  }
  const connIds=new Set([d.id]);
  const connLinks=new Set();
  links.forEach(l=>{
    const sid=l.source.id||l.source,tid=l.target.id||l.target;
    if(sid===d.id||tid===d.id){connIds.add(sid);connIds.add(tid);connLinks.add(l);}
  });
  nodeSel.classed('dim',n=>!connIds.has(n.id));
  nodeSel.select('circle').classed('sel',n=>n.id===d.id).attr('stroke',n=>connIds.has(n.id)?n.color:'#333');
  linkSel.classed('hi',l=>connLinks.has(l)).classed('dim',l=>!connLinks.has(l));
  applyVisibility();
}

// Tooltip
const tip=document.getElementById('tip');
function showTip(e,d){
  const callees=links.filter(l=>(l.source.id||l.source)===d.id);
  const callers=links.filter(l=>(l.target.id||l.target)===d.id);
  const xCallees=callees.filter(l=>l.type==='cross'), iCallees=callees.filter(l=>l.type==='int');
  const xCallers=callers.filter(l=>l.type==='cross'), iCallers=callers.filter(l=>l.type==='int');
  let h=`<div class="tt-contract" style="color:${d.color}">${CM[d.contract].name}</div><div class="tt-name">${d.name}</div><div class="tt-row">${d.loc} lines</div>`;
  if(xCallees.length){h+=`<div class="tt-sec"><div class="tt-sec-lbl">Calls →</div>`;xCallees.forEach(l=>{const tn=l.target,nm=tn.name||tn.id?.split('.')[1]||tn,tcid=tn.contract||(tn.id||'').split('.')[0];h+=`<div class="tt-fn" style="color:${CM[tcid]?.color||'#a5b4fc'}">${CM[tcid]?.name||tcid}.${nm}</div>`;});h+='</div>';}
  if(iCallees.length){h+=`<div class="tt-sec"><div class="tt-sec-lbl">Internal calls →</div>`;iCallees.forEach(l=>{const nm=l.target.name||l.target.id?.split('.')[1]||l.target;h+=`<div class="tt-fn-int">${nm}</div>`;});h+='</div>';}
  if(xCallers.length){h+=`<div class="tt-sec"><div class="tt-sec-lbl">← Called by</div>`;xCallers.forEach(l=>{const sn=l.source,nm=sn.name||sn.id?.split('.')[1]||sn,scid=sn.contract||(sn.id||'').split('.')[0];h+=`<div class="tt-fn" style="color:${CM[scid]?.color||'#a5b4fc'}">${CM[scid]?.name||scid}.${nm}</div>`;});h+='</div>';}
  if(iCallers.length){h+=`<div class="tt-sec"><div class="tt-sec-lbl">← Called by (internal)</div>`;iCallers.forEach(l=>{const nm=l.source.name||l.source.id?.split('.')[1]||l.source;h+=`<div class="tt-fn-int">${nm}</div>`;});h+='</div>';}
  tip.innerHTML=h; tip.style.display='block'; moveTip(e);
}
function moveTip(e){
  const rect=gcEl().getBoundingClientRect();
  let x=e.clientX-rect.left+16,y=e.clientY-rect.top-10;
  if(x+300>gcEl().clientWidth) x=e.clientX-rect.left-308;
  if(y+tip.clientHeight>gcEl().clientHeight) y=gcEl().clientHeight-tip.clientHeight-8;
  tip.style.left=x+'px';tip.style.top=y+'px';
}
function hideTip(){tip.style.display='none';}

// Controls
document.getElementById('chkInt').addEventListener('change',()=>applyVisibility());
document.getElementById('chkLbl').addEventListener('change',function(){
  nodeSel.selectAll('text').style('opacity',d=>this.checked&&d.r>=10?1:0);
});
document.getElementById('chkHull').addEventListener('change',()=>updateHulls());
document.getElementById('resetBtn').addEventListener('click',()=>{
  hiddenContracts.clear();
  document.querySelectorAll('.leg-item').forEach(el=>el.classList.remove('hidden'));
  focusNode(null);
  nodes.forEach(n=>{const m=CM[n.contract];n.x=m.cx*W()+(Math.random()-.5)*80;n.y=m.cy*H()+(Math.random()-.5)*80;n.vx=0;n.vy=0;n.fx=null;n.fy=null;});
  sim.alpha(.8).restart();
  svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity);
});

// Initial zoom
const s=Math.min(W()/1400,H()/1000,.72);
svg.call(zoom.transform,d3.zoomIdentity.translate((W()-1400*s)/2,(H()-1000*s)/2).scale(s));
</script>
</body>
