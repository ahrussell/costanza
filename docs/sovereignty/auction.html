<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<title>Auction & execution flow — The Human Fund</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --el: #ffffff;
    --tx: #111827;
    --mu: #6b7280;
    --ac: #4b9ea0;
    --as: #c9e3e3;
    --bd: #d1d5db;
    --bd-soft: #e5e7eb;
    --ad: #3a8183;
  }

  body {
    background: var(--bg);
    color: var(--tx);
    font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .scroll-pad {
    padding: 16px 16px 24px;
  }

  /* No card chrome — the surrounding blog post or standalone body
     provides framing already. */
  .viz {
    max-width: 880px;
    margin: 0 auto;
  }
  .viz.portrait { max-width: 480px; }

  .viz-svg-wrap {
    background: var(--el);
    border-radius: 8px;
    overflow: hidden;
  }

  .viz-desc {
    padding: 14px 4px 4px;
    margin: 0;
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--mu);
    min-height: 4em;
  }
  .viz.portrait .viz-desc { font-size: 14px; }

  .viz-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 4px 4px;
    border-top: 1px solid var(--bd-soft);
    margin-top: 10px;
  }
  .viz-controls button {
    background: var(--el);
    border: 1px solid var(--bd);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: "IBM Plex Sans", system-ui, sans-serif;
    font-size: 14px;
    color: var(--tx);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    min-width: 40px;
    transition: border-color .15s, background .15s;
  }
  .viz-controls button:hover { border-color: var(--ac); background: #fafafa; }
  .viz-controls .step-meta {
    font-family: "IBM Plex Mono", monospace;
    font-size: 12px;
    color: var(--mu);
    margin-left: 8px;
    letter-spacing: 0.03em;
  }

  @media (max-width: 600px) {
    .scroll-pad { padding: 12px 12px 20px; }
    .viz-desc { font-size: 14px; }
    .viz-controls button { padding: 5px 11px; font-size: 13px; min-height: 34px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: 0.01ms !important;
      animation-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="scroll-pad">
  <div class="viz" id="viz"></div>
</div>

<script type="module">
import React, { useState, useEffect, useRef, useMemo, useCallback } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1';
import { motion } from 'https://esm.sh/framer-motion@11.18.2?deps=react@18.3.1,react-dom@18.3.1';

const h = React.createElement;

const C = { el:'#fff', tx:'#111827', mu:'#6b7280', ac:'#4b9ea0', as:'#c9e3e3', bd:'#d1d5db', ad:'#3a8183' };
const F = { b:'"IBM Plex Sans",system-ui,sans-serif', m:'"IBM Plex Mono",monospace' };
const E = [.4, 0, .2, 1];

const STEPS = 10;
const INT = 6000;

const SA = [0,0,0,0,0,0,1,1,2,2];
const AL = ['Auction','Execution','Settlement'];

function polar(cx, cy, r, d) {
  const a = (d - 90) * Math.PI / 180;
  return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
}
function arc(cx, cy, r, s, e) {
  const [sx, sy] = polar(cx, cy, r, s);
  const [ex, ey] = polar(cx, cy, r, e);
  return `M${sx},${sy}A${r},${r},0,${e - s > 180 ? 1 : 0},1,${ex},${ey}`;
}

const descs = [
  'A new epoch begins. Bidders prepare to compete for the right to run Costanza’s inference.',
  'Each bidder submits a sealed bid and posts a bond to the smart contract.',
  'Bonds are collected by the contract. The sealed bids are locked until the reveal window.',
  'The commit window closes. Bidders reveal their bids publicly.',
  'The lowest bid wins. Bidder A’s bid of 0.0005 ETH undercuts the others.',
  'Losing bidders get their bonds back. The winning bid becomes the bounty, held with the winner’s bond until execution.',
  'The winner loads the current on-chain state into a hardware-sealed Trusted Execution Environment.',
  'The TEE runs inference and produces a diary entry, an action, and a cryptographic proof of valid computation.',
  'The outputs are submitted to the smart contract for on-chain verification.',
  'The contract verifies the proof, publishes the diary, executes the action, and pays the bounty and bond to the winner.',
];

// Container-width-based portrait/landscape switch.
const PORTRAIT_THRESHOLD = 620;

function useContainerLayout(containerRef) {
  const [portrait, setPortrait] = useState(false);
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const update = () => {
      const w = el.getBoundingClientRect().width;
      setPortrait(w > 0 && w < PORTRAIT_THRESHOLD);
    };
    update();
    if (typeof ResizeObserver !== 'undefined') {
      const ro = new ResizeObserver(update);
      ro.observe(el);
      return () => ro.disconnect();
    }
    window.addEventListener('resize', update);
    return () => window.removeEventListener('resize', update);
  }, [containerRef]);
  return portrait;
}

function EpochViz() {
  const containerRef = useRef(null);
  const isPortrait = useContainerLayout(containerRef);

  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(true);
  const [progress, setProgress] = useState(0);
  const tr = useRef();
  const pr = useRef();

  const action = useMemo(() => {
    const p = ['Donate $42','Invest 2 ETH','Withdraw 1.5 ETH','noop'];
    return p[Math.floor(Math.random() * p.length)];
  }, []);

  const next = useCallback(() => { setStep(s => (s + 1) % STEPS); setProgress(0); }, []);
  const prev = useCallback(() => { setStep(s => (s - 1 + STEPS) % STEPS); setProgress(0); }, []);
  const go = fn => () => {
    fn();
    if (playing) {
      clearInterval(tr.current);
      tr.current = setInterval(next, INT);
      setProgress(0);
    }
  };

  useEffect(() => {
    if (!playing) { clearInterval(tr.current); clearInterval(pr.current); return; }
    setProgress(0);
    tr.current = setInterval(next, INT);
    const tick = 100;
    pr.current = setInterval(() => setProgress(p => Math.min(p + tick / INT, 1)), tick);
    return () => { clearInterval(tr.current); clearInterval(pr.current); };
  }, [playing, next]);

  const act = SA[step];
  const t = { duration: .8, ease: E };

  // ── Layout dimensions ──
  // Landscape gives plenty of horizontal room; portrait is taller.
  const vW = isPortrait ? 400 : 840;
  const vH = isPortrait ? 520 : 420;

  // ── Position tables ──
  // Landscape (840x420): rooted at the same triangle as before but
  // scaled out so labels and pills don't crowd each other.
  const PL = {
    contract: [[420,292,1],[420,292,1],[420,292,1],[420,292,1],[420,292,1],[420,292,1],[420,292,0],[420,292,0],[528,255,1],[456,255,1]],
    winner:   [[156,158,1],[156,158,1],[156,158,1],[156,158,1],[156,158,1],[156,158,1],[222,248,1],[222,248,1],[180,248,1],[180,248,1]],
    bidB:     [[420,93,1],[420,93,1],[420,93,1],[420,93,1],[420,93,1],[420,93,1],[420,93,0],[420,93,0],[420,93,0],[420,93,0]],
    bidC:     [[684,158,1],[684,158,1],[684,158,1],[684,158,1],[684,158,1],[684,158,1],[684,158,0],[684,158,0],[684,158,0],[684,158,0]],
    bidPillA: [[156,225,0],[156,225,1],[156,225,1],[156,225,1],[156,225,1],[156,225,0],[156,225,0],[156,225,0],[156,225,0],[156,225,0]],
    bidPillB: [[420,150,0],[420,150,1],[420,150,1],[420,150,1],[420,150,1],[420,150,0],[420,150,0],[420,150,0],[420,150,0],[420,150,0]],
    bidPillC: [[684,225,0],[684,225,1],[684,225,1],[684,225,1],[684,225,1],[684,225,0],[684,225,0],[684,225,0],[684,225,0],[684,225,0]],
    bondA:    [[156,278,0],[156,278,1],[372,363,1],[372,363,1],[372,363,1],[768,102,1],[768,102,1],[768,102,1],[768,102,1],[180,318,1]],
    bondB:    [[420,202,0],[420,202,1],[420,363,1],[420,363,1],[420,363,1],[420,147,1],[420,147,0],[420,147,0],[420,147,0],[420,147,0]],
    bondC:    [[684,278,0],[684,278,1],[468,363,1],[468,363,1],[468,363,1],[684,218,1],[684,218,0],[684,218,0],[684,218,0],[684,218,0]],
    bounty:   [[156,225,0],[156,225,0],[156,225,0],[156,225,0],[156,225,0],[768,52,1],[768,52,1],[768,52,1],[768,52,1],[180,285,1]],
    enclave:  [[516,248,0],[516,248,0],[516,248,0],[516,248,0],[516,248,0],[516,248,0],[516,248,1],[516,248,1],[516,248,0],[516,248,0]],
    state:    [[108,248,0],[108,248,0],[108,248,0],[108,248,0],[108,248,0],[108,248,0],[108,248,1],[516,288,0],[516,288,0],[516,288,0]],
    diary:    [[636,195,0],[636,195,0],[636,195,0],[636,195,0],[636,195,0],[636,195,0],[636,195,0],[720,170,1],[360,172,1],[744,172,1]],
    actionO:  [[636,248,0],[636,248,0],[636,248,0],[636,248,0],[636,248,0],[636,248,0],[636,248,0],[720,232,1],[360,232,1],[744,232,1]],
    proof:    [[636,300,0],[636,300,0],[636,300,0],[636,300,0],[636,300,0],[636,300,0],[636,300,0],[720,294,1],[360,292,1],[744,292,1]],
  };

  // Portrait (400x520): vertical layout.
  const PP = {
    contract: [[200,333,1],[200,333,1],[200,333,1],[200,333,1],[200,333,1],[200,333,1],[200,333,0],[200,333,0],[200,420,1],[200,313,1]],
    winner:   [[80,135,1],[80,135,1],[80,135,1],[80,135,1],[80,135,1],[80,135,1],[120,165,1],[120,165,1],[200,99,1],[200,99,1]],
    bidB:     [[200,73,1],[200,73,1],[200,73,1],[200,73,1],[200,73,1],[200,73,1],[200,73,0],[200,73,0],[200,73,0],[200,73,0]],
    bidC:     [[320,135,1],[320,135,1],[320,135,1],[320,135,1],[320,135,1],[320,135,1],[320,135,0],[320,135,0],[320,135,0],[320,135,0]],
    bidPillA: [[80,203,0],[80,203,1],[80,203,1],[80,203,1],[80,203,1],[80,203,0],[80,203,0],[80,203,0],[80,203,0],[80,203,0]],
    bidPillB: [[200,141,0],[200,141,1],[200,141,1],[200,141,1],[200,141,1],[200,141,0],[200,141,0],[200,141,0],[200,141,0],[200,141,0]],
    bidPillC: [[320,203,0],[320,203,1],[320,203,1],[320,203,1],[320,203,1],[320,203,0],[320,203,0],[320,203,0],[320,203,0],[320,203,0]],
    bondA:    [[80,249,0],[80,249,1],[162,387,1],[162,387,1],[162,387,1],[337,99,1],[337,99,1],[337,99,1],[337,99,1],[200,226,1]],
    bondB:    [[200,183,0],[200,183,1],[200,387,1],[200,387,1],[200,387,1],[200,141,1],[200,141,0],[200,141,0],[200,141,0],[200,141,0]],
    bondC:    [[320,249,0],[320,249,1],[238,387,1],[238,387,1],[238,387,1],[320,203,1],[320,203,0],[320,203,0],[320,203,0],[320,203,0]],
    bounty:   [[80,203,0],[80,203,0],[80,203,0],[80,203,0],[80,203,0],[337,38,1],[337,38,1],[337,38,1],[337,38,1],[200,176,1]],
    enclave:  [[120,336,0],[120,336,0],[120,336,0],[120,336,0],[120,336,0],[120,336,0],[120,336,1],[120,336,1],[120,336,0],[120,336,0]],
    state:    [[120,92,0],[120,92,0],[120,92,0],[120,92,0],[120,92,0],[120,92,0],[120,92,1],[120,367,0],[120,367,0],[120,367,0]],
    diary:    [[300,300,0],[300,300,0],[300,300,0],[300,300,0],[300,300,0],[300,300,0],[300,300,0],[300,300,1],[200,233,1],[200,392,1]],
    actionO:  [[300,348,0],[300,348,0],[300,348,0],[300,348,0],[300,348,0],[300,348,0],[300,348,0],[300,348,1],[200,278,1],[200,440,1]],
    proof:    [[300,396,0],[300,396,0],[300,396,0],[300,396,0],[300,396,0],[300,396,0],[300,396,0],[300,396,1],[200,323,1],[200,488,1]],
  };

  const P = isPortrait ? PP : PL;
  const p = id => P[id][step];

  const A = (id, ch, tx) => {
    const [x, y, o] = p(id);
    return h(motion.g, {
      initial: { x, y, opacity: 0 },
      animate: { x, y, opacity: o },
      transition: tx || t,
    }, ch);
  };

  // Connection lines: [x1, y1, x2, y2, visibleSteps[], dashed, accent]
  // Endpoints land on element edges (not centers) so lines visually connect.
  const linesL = [
    // Step 2: bonds → contract (dashed, from each bidder's bond)
    [156, 200, 372, 348, [2], true, false],
    [420, 220, 420, 350, [2], true, false],
    [684, 200, 468, 348, [2], true, false],
    // Step 5: bonds B and C return to bidders
    [400, 295, 420, 165, [5], false, false],
    [445, 295, 660, 220, [5], false, false],
    // Step 6: state → winner → enclave
    [128, 248, 200, 248, [6], false, false],
    [248, 248, 414, 248, [6], false, false],
    // Step 7: enclave → outputs (right side)
    [620, 218, 670, 175, [7], false, false],
    [620, 248, 670, 232, [7], false, false],
    [620, 278, 670, 295, [7], false, false],
    // Step 8: outputs → contract (accent arrows)
    [410, 175, 460, 240, [8], false, true],
    [440, 232, 470, 252, [8], false, true],
    [445, 290, 470, 268, [8], false, true],
  ];
  const linesP = [
    [80, 175, 162, 365, [2], true, false],
    [200, 105, 200, 370, [2], true, false],
    [320, 175, 238, 365, [2], true, false],
    [192, 370, 200, 160, [5], false, false],
    [208, 370, 320, 220, [5], false, false],
    [120, 110, 120, 120, [6], false, false],
    [120, 195, 120, 280, [6], false, false],
    [200, 320, 248, 300, [7], false, false],
    [200, 348, 248, 348, [7], false, false],
    [200, 376, 248, 396, [7], false, false],
    [223, 250, 200, 400, [8], false, true],
    [200, 295, 200, 400, [8], false, true],
    [177, 340, 200, 400, [8], false, true],
  ];
  const lines = isPortrait ? linesP : linesL;

  // Mini phase ring (top-left)
  const rc = isPortrait ? 36 : 50;
  const ry = isPortrait ? 32 : 42;
  const rr = isPortrait ? 18 : 22;
  const actStart = SA.indexOf(act);
  const actEnd = SA.lastIndexOf(act);
  const stepsInAct = actEnd - actStart + 1;
  const actProgress = ((step - actStart) + progress) / stepsInAct;

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    el.classList.toggle('portrait', isPortrait);
  }, [isPortrait]);

  return h('div', { ref: containerRef, className: 'viz' + (isPortrait ? ' portrait' : '') },
    h('div', { className: 'viz-svg-wrap' },
      h('svg', {
        viewBox: `0 0 ${vW} ${vH}`,
        width: '100%',
        style: { display: 'block', aspectRatio: `${vW}/${vH}` },
      },
        h('defs', null,
          h('marker', { id:'arr', viewBox:'0 0 10 10', refX:9, refY:5, markerWidth:6, markerHeight:6, orient:'auto' },
            h('path', { d:'M0,2 L8,5 L0,8', fill:'none', stroke:C.mu, strokeWidth:1.5, strokeLinecap:'round' })),
          h('marker', { id:'arrA', viewBox:'0 0 10 10', refX:9, refY:5, markerWidth:6, markerHeight:6, orient:'auto' },
            h('path', { d:'M0,2 L8,5 L0,8', fill:'none', stroke:C.ac, strokeWidth:1.5, strokeLinecap:'round' }))),

        // Mini phase ring
        ...AL.map((_, i) => {
          const span = 360 / 3, s = i * span + 5, e = (i + 1) * span - 5;
          const isAct = act === i;
          const bg = h(motion.path, {
            key: 'rbg' + i,
            d: arc(rc, ry, rr, s, e),
            fill: 'none',
            strokeLinecap: 'round',
            animate: { stroke: C.bd, strokeWidth: isAct ? 3 : 1.5, opacity: isAct ? .35 : .2 },
            transition: { duration: .3 },
            style: { cursor: 'pointer' },
            onClick: go(() => { const f = SA.indexOf(i); if (f >= 0) setStep(f); }),
          });
          if (!isAct) return bg;
          const fillEnd = s + (e - s) * actProgress;
          const fillArc = fillEnd > s + 1 ? h('path', {
            key: 'rfill' + i,
            d: arc(rc, ry, rr, s, Math.min(fillEnd, e)),
            fill: 'none',
            stroke: C.ac,
            strokeWidth: 3,
            strokeLinecap: 'round',
            style: { cursor: 'pointer' },
            onClick: go(() => { const f = SA.indexOf(i); if (f >= 0) setStep(f); }),
          }) : null;
          return h('g', { key: 'rg' + i }, bg, fillArc);
        }),
        h(motion.text, {
          x: rc + rr + 8, y: ry, key: 'al' + act, dominantBaseline: 'central',
          fontFamily: F.m, fontSize: 12, fill: C.mu, letterSpacing: '0.06em', opacity: .7,
          initial: { opacity: 0 }, animate: { opacity: .7 }, transition: { duration: .25 },
        }, AL[act].toUpperCase()),

        // Connection lines
        ...lines.map((l, i) => {
          const vis = l[4].includes(step);
          return h(motion.line, {
            key: 'ln' + i, x1: l[0], y1: l[1], x2: l[2], y2: l[3],
            stroke: l[6] ? C.ac : C.mu, strokeWidth: 1.3, strokeDasharray: l[5] ? '5 4' : undefined,
            markerEnd: l[6] ? 'url(#arrA)' : 'url(#arr)',
            animate: { opacity: vis ? .5 : 0 }, transition: { duration: .3, delay: vis ? .3 : 0 },
          });
        }),

        // ── ACTORS ──

        // Smart Contract
        A('contract', h('g', null,
          h('rect', { x:-85, y:-28, width:170, height:56, rx:9, fill:C.el, stroke:C.bd, strokeWidth:1.5 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.b, fontSize:15, fontWeight:500, fill:C.tx }, 'Smart Contract'))),

        // Winner / Bidder A
        A('winner', h('g', null,
          h(motion.circle, { r:22, strokeWidth:1.5,
            animate: { fill: step >= 4 ? C.as : C.el, stroke: step >= 4 ? C.ac : C.bd }, transition: { duration: .4 } }),
          h('text', { textAnchor:'middle', y:1, dominantBaseline:'central', fontFamily:F.b, fontSize:15, fontWeight:600,
            fill: step >= 4 ? C.ac : C.mu }, 'A'),
          step <= 5 ? h('text', { textAnchor: isPortrait ? 'start' : 'end', x: isPortrait ? 30 : -30, y:1, dominantBaseline:'central', fontFamily:F.b, fontSize:13, fontWeight:500, fill:C.tx },
            step <= 4 ? 'Bidder A' : 'Winner')
          : h('text', { textAnchor:'middle', y:36, fontFamily:F.b, fontSize:13, fontWeight:500, fill:C.tx }, 'Winner'))),

        // Bidder B
        A('bidB', h('g', null,
          h('circle', { r:18, fill:C.el, stroke:C.bd, strokeWidth:1.5 }),
          h('text', { textAnchor:'middle', y:1, dominantBaseline:'central', fontFamily:F.b, fontSize:14, fontWeight:600, fill:C.mu }, 'B'),
          h('text', { textAnchor:'middle', y:-28, fontFamily:F.b, fontSize:13, fill:C.tx }, 'Bidder B'))),

        // Bidder C
        A('bidC', h('g', null,
          h('circle', { r:18, fill:C.el, stroke:C.bd, strokeWidth:1.5 }),
          h('text', { textAnchor:'middle', y:1, dominantBaseline:'central', fontFamily:F.b, fontSize:14, fontWeight:600, fill:C.mu }, 'C'),
          h('text', { textAnchor: isPortrait ? 'end' : 'start', x: isPortrait ? -30 : 30, y:1, dominantBaseline:'central', fontFamily:F.b, fontSize:13, fill:C.tx }, 'Bidder C'))),

        // Sealed bid pill A
        A('bidPillA', h('g', null,
          h(motion.rect, { x:-50, y:-14, width:100, height:28, rx:14, strokeWidth:1.2,
            animate: { fill: step <= 2 ? '#374151' : step === 3 ? C.el : C.as, stroke: step <= 2 ? '#1f2937' : step === 3 ? C.bd : C.ac },
            transition: { duration: .5 } }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:11, fontWeight: step <= 2 ? 400 : 500,
            fill: step <= 2 ? '#d1d5db' : step === 3 ? C.tx : C.ad },
            step <= 2 ? '🔒 sealed' : '0.0005 ETH'),
          step === 4 ? h(motion.text, { textAnchor:'middle', y:24, fontFamily:F.m, fontSize:11, fontWeight:500, fill:C.ac,
            initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .3, duration: .3 } }, 'lowest bid wins') : null)),

        // Sealed bid pill B
        A('bidPillB', h('g', null,
          h(motion.rect, { x:-50, y:-14, width:100, height:28, rx:14, strokeWidth:1.2,
            animate: { fill: step <= 2 ? '#374151' : C.el, stroke: step <= 2 ? '#1f2937' : C.bd }, transition: { duration: .5 } }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:11,
            fill: step <= 2 ? '#d1d5db' : C.tx }, step <= 2 ? '🔒 sealed' : '0.0008 ETH'))),

        // Sealed bid pill C
        A('bidPillC', h('g', null,
          h(motion.rect, { x:-50, y:-14, width:100, height:28, rx:14, strokeWidth:1.2,
            animate: { fill: step <= 2 ? '#374151' : C.el, stroke: step <= 2 ? '#1f2937' : C.bd }, transition: { duration: .5 } }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:11,
            fill: step <= 2 ? '#d1d5db' : C.tx }, step <= 2 ? '🔒 sealed' : '0.001 ETH'))),

        // Individual bond pills
        A('bondA', h('g', null,
          h('rect', { x:-44, y:-12, width:88, height:24, rx:12, fill:'#fef3c7', stroke:'#f59e0b', strokeWidth:1 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:10, fill:'#92400e' }, 'bond 0.01 ETH'),
          step >= 5 && step < 9 ? h('text', { textAnchor:'middle', y:21, fontFamily:F.b, fontSize:10, fill:C.mu }, 'held') : null,
          step === 9 ? h('text', { textAnchor:'middle', y:21, fontFamily:F.b, fontSize:10, fill:C.mu }, 'returned') : null)),

        A('bondB', h('g', null,
          h('rect', { x:-44, y:-12, width:88, height:24, rx:12, fill:'#fef3c7', stroke:'#f59e0b', strokeWidth:1 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:10, fill:'#92400e' }, 'bond 0.01 ETH'))),

        A('bondC', h('g', null,
          h('rect', { x:-44, y:-12, width:88, height:24, rx:12, fill:'#fef3c7', stroke:'#f59e0b', strokeWidth:1 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:10, fill:'#92400e' }, 'bond 0.01 ETH'))),

        // Max bid label (steps 0-2)
        step <= 2 ? h(motion.text, {
          x: isPortrait ? 200 : 420, y: isPortrait ? 480 : 405, textAnchor:'middle',
          fontFamily: F.m, fontSize: 12, fill: C.mu,
          initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .3, duration: .3 },
        }, 'Max bid: 0.002 ETH') : null,

        // Secure Computing Enclave
        A('enclave', h('g', null,
          h('rect', { x:-95, y:-65, width:190, height:130, rx:10, fill:'#f0fafa', stroke:C.ac, strokeWidth:1.5, strokeDasharray:'7 4' }),
          h('text', { textAnchor:'middle', y:-46, fontFamily:F.m, fontSize:12, fontWeight:600, fill:C.ac }, 'Secure Computing Enclave'),
          h('g', { transform:'translate(0,-15)' },
            h('rect', { x:-9, y:-1, width:18, height:13, rx:2.5, fill:'none', stroke:C.ac, strokeWidth:1.3 }),
            h('path', { d:'M-4.5,-1 V-6 A4.5,4.5,0,0,1,4.5,-6 V-1', fill:'none', stroke:C.ac, strokeWidth:1.3 })),
          h('text', { textAnchor:'middle', y:18, fontFamily:F.m, fontSize:10, fill:C.mu }, '70B LLM + dm-verity rootfs'),
          h('text', { textAnchor:'middle', y:33, fontFamily:F.m, fontSize:10, fill:C.mu }, 'Intel TDX hardware'),
          step === 7 ? h(motion.text, { textAnchor:'middle', y:50, fontFamily:F.m, fontSize:10, fontWeight:500, fill:C.ac,
            initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .3, duration: .4 } }, 'running inference…') : null)),

        // On-chain State
        A('state', h('g', null,
          h('rect', { x:-65, y:-18, width:130, height:36, rx:7, fill:C.el, stroke:C.bd, strokeWidth:1.2 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:13, fill:C.tx }, 'On-chain State'))),

        // Output: Diary
        A('diary', h('g', null,
          h(motion.rect, { x:-52, y:-15, width:104, height:30, rx:15,
            animate: { fill: step >= 9 ? C.as : step >= 8 ? '#f0fafa' : C.el, stroke: step >= 8 ? C.ac : C.bd },
            transition: { duration: .3 }, strokeWidth:1.2 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:12, fill: step >= 8 ? C.ad : C.tx }, 'Diary entry'),
          step === 9 ? h(motion.text, { textAnchor:'middle', y:25, fontFamily:F.m, fontSize:10, fill:C.ac,
            initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .4, duration: .3 } }, '✓ published') : null)),

        // Output: Action
        A('actionO', h('g', null,
          h(motion.rect, { x:-82, y:-15, width:164, height:30, rx:15,
            animate: { fill: step >= 9 ? C.as : '#f0fafa', stroke: C.ac }, strokeWidth:1.2 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:12, fontWeight:500, fill:C.ad }, 'Action: ' + action),
          step === 9 ? h(motion.text, { textAnchor:'middle', y:25, fontFamily:F.m, fontSize:10, fill:C.ac,
            initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .7, duration: .3 } }, '✓ executed') : null)),

        // Output: Proof
        A('proof', h('g', null,
          h(motion.rect, { x:-92, y:-15, width:184, height:30, rx:15,
            animate: { fill: step >= 9 ? C.as : step >= 8 ? '#f0fafa' : C.el, stroke: step >= 8 ? C.ac : C.bd },
            transition: { duration: .3 }, strokeWidth:1.2 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:11, fill: step >= 8 ? C.ad : C.tx }, 'Proof of valid computation'),
          step === 9 ? h(motion.text, { textAnchor:'middle', y:25, fontFamily:F.m, fontSize:10, fill:C.ac,
            initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { delay: .2, duration: .3 } }, '✓ verified') : null)),

        // Bounty
        A('bounty', h('g', null,
          h('rect', { x:-52, y:-14, width:104, height:28, rx:14, fill:C.ac, opacity:.14 }),
          h('text', { textAnchor:'middle', dominantBaseline:'central', fontFamily:F.m, fontSize:13, fontWeight:600, fill:C.ac }, '0.0005 ETH'),
          h('text', { textAnchor:'middle', y:25, fontFamily:F.b, fontSize:11, fill:C.mu }, step === 9 ? 'paid' : 'bounty')),
          step === 9 ? { duration: .9, ease: E, delay: .3 } : t),
      )
    ),

    // Description
    h(motion.p, {
      key: 'd' + step,
      className: 'viz-desc',
      initial: { opacity: 0 }, animate: { opacity: 1 }, transition: { duration: .3 },
    }, descs[step]),

    // Controls
    h('div', { className: 'viz-controls' },
      h('button', { onClick: go(prev), title: 'Previous', 'aria-label': 'Previous step' }, '◀'),
      h('button', { onClick: () => setPlaying(q => !q),
        title: playing ? 'Pause' : 'Play', 'aria-label': playing ? 'Pause' : 'Play' }, playing ? '⏸' : '▶'),
      h('button', { onClick: go(next), title: 'Next', 'aria-label': 'Next step' }, '▶'),
      h('span', { className: 'step-meta' }, `${step + 1} of ${STEPS} · ${AL[SA[step]]}`)),
  );
}

const root = createRoot(document.getElementById('viz'));
root.render(h(EpochViz));

// ── postMessage auto-resize ─────────────────────────
let lastSentHeight = 0;
function sendHeight() {
  try {
    const h = Math.ceil(Math.max(
      document.body.scrollHeight,
      document.body.offsetHeight
    ));
    if (h <= 0 || h > 6000) return;
    if (Math.abs(h - lastSentHeight) < 2) return;
    lastSentHeight = h;
    window.parent.postMessage({ type: 'auction:height', height: h }, '*');
  } catch (e) {}
}
window.addEventListener('load', () => {
  sendHeight();
  setTimeout(sendHeight, 200);
  setTimeout(sendHeight, 800);
});
window.addEventListener('resize', sendHeight);
if (typeof ResizeObserver !== 'undefined') {
  new ResizeObserver(sendHeight).observe(document.body);
}
try { window.parent.postMessage({ type: 'auction:ready' }, '*'); } catch (e) {}
</script>
