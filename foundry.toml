[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 50
via_ir = false
ffi = true
remappings = [
    "@automata-network/dcap-attestation/=lib/automata-dcap-attestation/evm/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
