# The Human Fund — TEE Deployment (Phala Cloud / dstack)
#
# Deploy to Phala Cloud:
#   docker build -t <dockerhub-user>/humanfund-tee:latest ./tee
#   docker push <dockerhub-user>/humanfund-tee:latest
#   phala deploy -c tee/docker-compose.yaml -n humanfund-tee --instance-type tdx.2xlarge
#
# The docker-compose hash is measured into RTMR[3] by dstack,
# creating a verifiable chain: hardware -> firmware -> OS -> this image -> model.

services:
  agent:
    image: ghcr.io/ahrussell/humanfund-tee:v3
    ports:
      - "8091:8090"
    volumes:
      # dstack injects the attestation socket into the CVM
      - /var/run/dstack.sock:/var/run/dstack.sock
      - /var/run/tappd.sock:/var/run/tappd.sock
    environment:
      - LLAMA_SERVER_PORT=8080
      - ENCLAVE_PORT=8090
