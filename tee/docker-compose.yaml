# The Human Fund — TEE Deployment (Phala Cloud / dstack)
#
# Deploy to Phala Cloud:
#   phala cvms create docker-compose.yaml
#
# Or via the Phala Cloud dashboard (Advanced tab):
#   Upload this file directly.
#
# The docker-compose hash is measured into RTMR[3] by dstack,
# creating a verifiable chain: hardware → firmware → OS → this image → model.

services:
  agent:
    build: .
    ports:
      - "8090:8090"
    volumes:
      # dstack injects the attestation socket into the CVM
      - /var/run/dstack.sock:/var/run/dstack.sock
    environment:
      - MODEL_PATH=/models/DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf
      - LLAMA_SERVER_PORT=8080
      - ENCLAVE_PORT=8090
    # CPU-only: 14B Q4_K_M needs ~12 GB RAM for weights + ~4 GB for 16K context
    # Request at least 24 GB to be safe
    deploy:
      resources:
        limits:
          memory: 32G
        reservations:
          memory: 24G
