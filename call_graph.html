<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Human Fund — Contract Call Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: #0d1117;
  color: #e6edf3;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; }
header .subtitle { color: #8b949e; font-size: 13px; }
.badge {
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 10px; background: #1f6feb33; color: #58a6ff;
  border: 1px solid #1f6feb66;
}

.layout { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 260px;
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 12px 14px 8px;
  border-bottom: 1px solid #30363d;
}
.sidebar-header h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8b949e;
}
.legend { padding: 8px 14px; border-bottom: 1px solid #30363d; }
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 6px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.15s;
}
.legend-item:hover { background: rgba(255,255,255,0.05); }
.legend-item.selected { background: rgba(255,255,255,0.08); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-count { margin-left: auto; font-size: 11px; color: #8b949e; font-family: monospace; }

.fn-panel { flex: 1; overflow-y: auto; padding: 10px 14px; }
.fn-panel-title { font-size: 12px; color: #8b949e; margin-bottom: 8px; }
.fn-group-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #8b949e;
  margin: 10px 0 4px;
}
.fn-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
  font-size: 12px;
  font-family: 'SFMono-Regular', 'Consolas', monospace;
  cursor: pointer;
  border-radius: 4px;
  transition: background 0.1s;
  line-height: 1.5;
}
.fn-item:hover { background: rgba(255,255,255,0.06); }
.fn-item.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }
.fn-vis {
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.vis-external { background: #1a3a4a; color: #56b6d8; }
.vis-public   { background: #1a3a2a; color: #4caf7f; }
.vis-internal { background: #2a2a2a; color: #8b949e; }
.vis-owner    { background: #3a2a1a; color: #e6a45a; }

.controls {
  padding: 10px 14px;
  border-top: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: #8b949e;
  cursor: pointer;
  user-select: none;
}
.toggle-row input { cursor: pointer; accent-color: #4f86c6; }

/* Graph */
#graph-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
svg#graph { width: 100%; height: 100%; }

.contract-box {
  cursor: pointer;
}
.contract-rect {
  rx: 8;
  stroke-width: 1.5;
  stroke-opacity: 0.7;
  transition: stroke-width 0.2s;
}
.contract-rect:hover, .contract-rect.selected {
  stroke-width: 2.5;
  stroke-opacity: 1;
}
.contract-name {
  font-size: 13px;
  font-weight: 700;
  fill: white;
  text-anchor: middle;
  pointer-events: none;
}
.contract-sub {
  font-size: 10px;
  fill: rgba(255,255,255,0.5);
  text-anchor: middle;
  pointer-events: none;
}

/* Edges */
.edge {
  fill: none;
  marker-end: url(#arrow);
}
.edge-cross {
  stroke-width: 2;
  opacity: 0.7;
  transition: opacity 0.2s, stroke-width 0.2s;
}
.edge-cross:hover, .edge-cross.highlighted {
  opacity: 1;
  stroke-width: 3;
}
.edge-internal {
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
  opacity: 0.3;
  transition: opacity 0.2s;
}
.edge-internal.hidden { display: none; }
.edge-internal.highlighted { opacity: 0.9; display: block; }

.edge-label {
  font-size: 10px;
  fill: #8b949e;
  text-anchor: middle;
  pointer-events: none;
  dominant-baseline: central;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  pointer-events: none;
  max-width: 280px;
  z-index: 100;
  line-height: 1.6;
}
.tooltip-title { font-weight: 700; margin-bottom: 4px; font-family: monospace; }
.tooltip-section { margin-top: 6px; }
.tooltip-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  color: #8b949e;
  letter-spacing: 0.06em;
}
.tooltip-fn {
  font-family: monospace;
  font-size: 11px;
  color: #a5b4fc;
  padding: 1px 0;
}

.info-placeholder {
  padding: 20px 14px;
  color: #8b949e;
  font-size: 12px;
  text-align: center;
  line-height: 1.7;
}
</style>
</head>
<body>

<header>
  <h1>The Human Fund</h1>
  <span class="subtitle">Contract Call Graph</span>
  <span class="badge">nextphase</span>
  <span style="margin-left:auto; font-size:12px; color:#8b949e">Click a contract to explore • Scroll to zoom • Drag to pan</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>Contracts</h3>
    </div>
    <div class="legend" id="legend"></div>
    <div class="fn-panel" id="fn-panel">
      <div class="info-placeholder">Click a contract to see its functions and call edges.</div>
    </div>
    <div class="controls">
      <label class="toggle-row">
        <input type="checkbox" id="toggle-internal" checked>
        Show internal calls
      </label>
      <label class="toggle-row">
        <input type="checkbox" id="toggle-labels" checked>
        Show edge labels

    </div>
  </div>

  <div id="graph-container">
    <svg id="graph"></svg>
    <div class="tooltip" id="tooltip" style="display:none"></div>
  </div>
</div>

// ── Compute edge path between two contract boxes ─────────────────────────────
function edgePath(srcId, tgtId) {
  const s = contractBox(srcId);
  const t = contractBox(tgtId);
  const sx = s.x, sy = s.y + s.h / 2;
  const tx = t.x, ty = t.y + t.h / 2;

  // Determine exit/entry sides
  const dx = tx - sx, dy = ty - sy;

  let x1, y1, x2, y2;
  if (Math.abs(dy) > Math.abs(dx) * 0.8) {
    // Primarily vertical
    x1 = sx; y1 = dy > 0 ? s.y + s.h : s.y;
    x2 = tx; y2 = dy > 0 ? t.y       : t.y + t.h;
  } else {
    // Primarily horizontal
    x1 = dx > 0 ? s.x + s.w : s.x; y1 = sy;
    x2 = dx > 0 ? t.x       : t.x + t.w; y2 = ty;
  }

  const cx1 = x1 + (x2 - x1) * 0.45;
  const cy1 = y1 + (y2 - y1) * 0.1;
  const cx2 = x1 + (x2 - x1) * 0.55;
  const cy2 = y1 + (y2 - y1) * 0.9;

  // Shorten end by 8px for arrowhead
  const len = Math.hypot(x2 - cx2, y2 - cy2);
  const ex = len > 8 ? x2 - (x2 - cx2) / len * 8 : x2;
  const ey = len > 8 ? y2 - (y2 - cy2) / len * 8 : y2;

  return `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}`;
}

// ── Select / highlight ────────────────────────────────────────────────────────
function selectContract(id) {
  selectedContract = id;
  highlightedFn = null;

  // Update legend
  document.querySelectorAll('.legend-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });

  // Update contract box styling
  contractElements.select('.contract-rect')
    .style('stroke-width', d => d.id === id ? '3px' : '1.5px')
    .attr('fill', d => {
      if (!id) return d.color + '22';
      if (d.id === id) return d.color + '44';
      const edge = CROSS_EDGES.find(e => (e.source === id && e.target === d.id) || (e.target === id && e.source === d.id));
      return edge ? d.color + '33' : d.color + '0a';
    });

  // Update edge visibility
  edgeElements
    .style('opacity', d => {
      if (!id) return 0.6;
      return (d.source === id || d.target === id) ? 1 : 0.1;
    })
    .style('stroke-width', d => {
      return (d.source === id || d.target === id) ? '3px' : '1.5px';
    });

  edgeLabelElements
    .style('opacity', d => {
      if (!id) return showEdgeLabels ? 1 : 0;
      return (d.source === id || d.target === id) ? (showEdgeLabels ? 1 : 0) : 0;
    });

  // Render sidebar
  renderFnPanel(id);
}

function renderFnPanel(id) {
  const panel = document.getElementById('fn-panel');
  if (!id) {
    panel.innerHTML = '<div class="info-placeholder">Click a contract to see its functions and call edges.</div>';
    return;
  }

  const contract = CONTRACTS.find(c => c.id === id);
  const color = contract.color;

  const groups = [
    { label: 'External / Public', vis: ['external', 'public'] },
    { label: 'Owner / Admin', vis: ['owner'] },
    { label: 'Internal', vis: ['internal'] },
  ];

  let html = `<div class="fn-panel-title" style="color:${color}">${contract.name}</div>`;
  html += `<div style="font-size:11px;color:#8b949e;margin-bottom:4px;">${contract.file}</div>`;

  groups.forEach(group => {
    const fns = contract.functions.filter(f => group.vis.includes(f.vis));
    if (!fns.length) return;
    html += `<div class="fn-group-label">${group.label}</div>`;
    fns.forEach(fn => {
      const visClass = fn.vis === 'owner' ? 'vis-owner' : `vis-${fn.vis}`;
      const modStr = fn.mod ? ` <span style="color:#8b949e;font-size:10px">${fn.mod}</span>` : '';
      const callers = getCallers(id, fn.name);
      const callees = getCallees(id, fn.name);
      html += `
        <div class="fn-item" data-fn="${fn.name}" title="${fn.desc || ''}"
          onmouseenter="highlightFn('${id}','${fn.name}')"
          onmouseleave="unhighlightFn()">
          <span class="fn-vis ${visClass}">${fn.vis}</span>
          <span>${fn.name}</span>${modStr}
          ${callers.length || callees.length ? `<span style="margin-left:auto;font-size:10px;color:#8b949e">${callees.length > 0 ? '→'+callees.length : ''}${callers.length > 0 ? ' ←'+callers.length : ''}</span>` : ''}
        </div>`;
    });
  });

  panel.innerHTML = html;
}

function getCallers(contractId, fnName) {
  const callers = [];
  // Internal callers
  const internalEdges = INTERNAL_EDGES[contractId] || [];
  internalEdges.filter(e => e.to === fnName).forEach(e => {
    callers.push({ contract: contractId, fn: e.from, type: 'internal' });
  });
  // Cross-contract callers
  CROSS_EDGES.filter(e => e.target === contractId).forEach(e => {
    e.calls.filter(c => c.to === fnName).forEach(c => {
      callers.push({ contract: e.source, fn: c.from, type: 'cross' });
    });
  });
  return callers;
}

function getCallees(contractId, fnName) {
  const callees = [];
  const internalEdges = INTERNAL_EDGES[contractId] || [];
  internalEdges.filter(e => e.from === fnName).forEach(e => {
    callees.push({ contract: contractId, fn: e.to, type: 'internal' });
  });
  CROSS_EDGES.filter(e => e.source === contractId).forEach(e => {
    e.calls.filter(c => c.from === fnName).forEach(c => {
      callees.push({ contract: e.target, fn: c.to, type: 'cross' });
    });
  });
  return callees;
}

function highlightFn(contractId, fnName) {
  highlightedFn = { contractId, fnName };

  // Find which cross edges involve this function
  const relevantEdges = new Set();
  CROSS_EDGES.forEach(e => {
    if (e.source === contractId) {
      if (e.calls.some(c => c.from === fnName)) relevantEdges.add(`${e.source}-${e.target}`);
    }
    if (e.target === contractId) {
      if (e.calls.some(c => c.to === fnName)) relevantEdges.add(`${e.source}-${e.target}`);
    }
  });

  edgeElements
    .style('opacity', d => relevantEdges.has(`${d.source}-${d.target}`) ? 1 : 0.05)
    .style('stroke-width', d => relevantEdges.has(`${d.source}-${d.target}`) ? '3.5px' : '1.5px');
}

function unhighlightFn() {
  if (!selectedContract) return;
  highlightedFn = null;
  selectContract(selectedContract); // re-apply contract highlight
}

  const srcContract = CONTRACTS.find(c => c.id === d.source);
  const tgtContract = CONTRACTS.find(c => c.id === d.target);

  let html = `<div class="tooltip-title" style="color:${srcContract.color}">${srcContract.name} → ${tgtContract.name}</div>`;
  html += `<div class="tooltip-section"><div class="tooltip-section-label">${d.calls.length} call${d.calls.length > 1 ? 's' : ''}</div>`;
  d.calls.forEach(c => {
    html += `<div class="tooltip-fn">${c.from} <span style="color:#8b949e">→</span> ${c.to}</div>`;
    if (c.desc) html += `<div style="font-size:10px;color:#8b949e;padding-left:8px;margin-bottom:2px">${c.desc}</div>`;
  });
  html += '</div>';

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  tooltip.style.left = (event.pageX + 14) + 'px';
  tooltip.style.top  = (event.pageY - 10) + 'px';
}

// ── Click outside to deselect ─────────────────────────────────────────────────
svg.on('click', () => selectContract(null));

// ── Toggles ───────────────────────────────────────────────────────────────────
document.getElementById('toggle-internal').addEventListener('change', function() {
  showInternalEdges = this.checked;
  // (internal edges are only shown in fn-panel hover; no separate SVG lines)
});

document.getElementById('toggle-labels').addEventListener('change', function() {
  showEdgeLabels = this.checked;
  edgeLabelElements.style('opacity', d => {
    if (!showEdgeLabels) return 0;
    if (!selectedContract) return 1;
    return (d.source === selectedContract || d.target === selectedContract) ? 1 : 0;
  });
});

// Initial: center the graph
const svgEl = document.getElementById('graph');
const bbox = svgEl.getBoundingClientRect();
const scaleX = bbox.width / (W + 80);
const scaleY = bbox.height / (H + 80);
const initialScale = Math.min(scaleX, scaleY, 1);
const tx = (bbox.width  - W * initialScale) / 2;
const ty = (bbox.height - H * initialScale) / 2;
svg.call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(initialScale));
</script>
</body>
</html>
